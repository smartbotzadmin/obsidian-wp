<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian Theme API Tester</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            line-height: 1.6;
        }
        .section {
            margin: 2rem 0;
            padding: 1.5rem;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
        }
        .form-group {
            margin: 1rem 0;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        input, select, button {
            padding: 0.5rem;
            border: 1px solid #d1d5db;
            border-radius: 0.25rem;
            font-size: 1rem;
        }
        input[type="color"] {
            width: 60px;
            height: 40px;
            padding: 0;
            border: none;
        }
        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            border-radius: 0.375rem;
        }
        button:hover {
            background: #1d4ed8;
        }
        .response {
            background: #f3f4f6;
            padding: 1rem;
            border-radius: 0.25rem;
            margin-top: 1rem;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }
        .success {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }
    </style>
</head>
<body>
    <h1>Obsidian Theme API Tester</h1>
    <p>This tool helps you test the Obsidian theme REST API endpoints.</p>
    
    <div class="section">
        <h2>WordPress Site Configuration</h2>
        <div class="form-group">
            <label for="siteUrl">WordPress Site URL:</label>
            <input type="url" id="siteUrl" placeholder="http://localhost/your-wp-site" value="http://localhost">
        </div>
        <div class="form-group">
            <label for="nonce">WordPress Nonce (get from browser dev tools):</label>
            <input type="text" id="nonce" placeholder="abc123def456">
        </div>
    </div>

    <div class="section">
        <h2>Get Current Theme Settings</h2>
        <button onclick="getThemeSettings()">Get All Settings</button>
        <button onclick="getColors()">Get Colors</button>
        <button onclick="getTypography()">Get Typography</button>
        <button onclick="getLayout()">Get Layout</button>
        <div id="getResponse" class="response" style="display: none;"></div>
    </div>

    <div class="section">
        <h2>Update Colors</h2>
        <div class="form-group">
            <label for="primaryColor">Primary Color:</label>
            <input type="color" id="primaryColor" value="#2563eb">
        </div>
        <div class="form-group">
            <label for="secondaryColor">Secondary Color:</label>
            <input type="color" id="secondaryColor" value="#64748b">
        </div>
        <div class="form-group">
            <label for="accentColor">Accent Color:</label>
            <input type="color" id="accentColor" value="#f59e0b">
        </div>
        <button onclick="updateColors()">Update Colors</button>
        <div id="colorResponse" class="response" style="display: none;"></div>
    </div>

    <div class="section">
        <h2>Update Typography</h2>
        <div class="form-group">
            <label for="primaryFont">Primary Font:</label>
            <select id="primaryFont">
                <option value="system-ui, -apple-system, sans-serif">System Sans-serif</option>
                <option value="Georgia, serif">Georgia (Serif)</option>
                <option value="Arial, sans-serif">Arial (Sans-serif)</option>
                <option value="'Times New Roman', serif">Times New Roman (Serif)</option>
            </select>
        </div>
        <div class="form-group">
            <label for="baseFontSize">Base Font Size:</label>
            <select id="baseFontSize">
                <option value="14px">14px</option>
                <option value="16px" selected>16px</option>
                <option value="18px">18px</option>
                <option value="20px">20px</option>
            </select>
        </div>
        <button onclick="updateTypography()">Update Typography</button>
        <div id="typographyResponse" class="response" style="display: none;"></div>
    </div>

    <div class="section">
        <h2>Update Layout</h2>
        <div class="form-group">
            <label for="containerWidth">Container Width:</label>
            <select id="containerWidth">
                <option value="1000px">1000px</option>
                <option value="1200px" selected>1200px</option>
                <option value="1400px">1400px</option>
                <option value="100%">Full Width</option>
            </select>
        </div>
        <div class="form-group">
            <label for="contentWidth">Content Width:</label>
            <select id="contentWidth">
                <option value="600px">600px</option>
                <option value="800px" selected>800px</option>
                <option value="1000px">1000px</option>
            </select>
        </div>
        <button onclick="updateLayout()">Update Layout</button>
        <div id="layoutResponse" class="response" style="display: none;"></div>
    </div>

    <script>
        function getSiteUrl() {
            return document.getElementById('siteUrl').value.replace(/\/$/, '');
        }

        function getNonce() {
            return document.getElementById('nonce').value;
        }

        function showResponse(elementId, data, isError = false) {
            const element = document.getElementById(elementId);
            element.style.display = 'block';
            element.className = 'response ' + (isError ? 'error' : 'success');
            element.textContent = JSON.stringify(data, null, 2);
        }

        async function makeRequest(endpoint, method = 'GET', data = null) {
            const url = `${getSiteUrl()}/wp-json/obsidian/v1/${endpoint}`;
            const options = {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                }
            };

            const nonce = getNonce();
            if (nonce) {
                options.headers['X-WP-Nonce'] = nonce;
            }

            if (data) {
                options.body = JSON.stringify(data);
            }

            try {
                const response = await fetch(url, options);
                const result = await response.json();
                return { success: response.ok, data: result };
            } catch (error) {
                return { success: false, data: { error: error.message } };
            }
        }

        async function getThemeSettings() {
            const result = await makeRequest('theme/settings');
            showResponse('getResponse', result.data, !result.success);
        }

        async function getColors() {
            const result = await makeRequest('theme/colors');
            showResponse('getResponse', result.data, !result.success);
        }

        async function getTypography() {
            const result = await makeRequest('theme/typography');
            showResponse('getResponse', result.data, !result.success);
        }

        async function getLayout() {
            const result = await makeRequest('theme/layout');
            showResponse('getResponse', result.data, !result.success);
        }

        async function updateColors() {
            const colors = {
                colors: {
                    primary: document.getElementById('primaryColor').value,
                    secondary: document.getElementById('secondaryColor').value,
                    accent: document.getElementById('accentColor').value
                }
            };
            const result = await makeRequest('theme/colors', 'POST', colors);
            showResponse('colorResponse', result.data, !result.success);
        }

        async function updateTypography() {
            const typography = {
                typography: {
                    'primary-family': document.getElementById('primaryFont').value,
                    'base-size': document.getElementById('baseFontSize').value
                }
            };
            const result = await makeRequest('theme/typography', 'POST', typography);
            showResponse('typographyResponse', result.data, !result.success);
        }

        async function updateLayout() {
            const layout = {
                layout: {
                    'container-width': document.getElementById('containerWidth').value,
                    'content-width': document.getElementById('contentWidth').value
                }
            };
            const result = await makeRequest('theme/layout', 'POST', layout);
            showResponse('layoutResponse', result.data, !result.success);
        }

        // Auto-detect WordPress site if running locally
        if (window.location.hostname === 'localhost') {
            document.getElementById('siteUrl').value = window.location.origin;
        }
    </script>
</body>
</html>
